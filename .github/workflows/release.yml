name: 🚀 Release PDF Commander

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger quando uma tag vX.X.X for criada

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Instalar dependências (Root)
      run: npm ci

    - name: 📦 Instalar dependências (Config-UI)
      run: |
        cd config-ui
        npm ci
        cd ..

    - name: 🏗️ Build da interface React
      run: |
        cd config-ui
        npm run build
        cd ..

    - name: ⚡ Cache Electron Builder
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/electron
          ~/.cache/electron-builder
        key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-

    - name: 📦 Build do executável
      run: npm run build:exe

    - name: 📋 Listar arquivos gerados
      run: |
        echo "=== Arquivos em dist-release ==="
        dir dist-release

    - name: 🎯 Criar Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: PDF Commander ${{ github.ref_name }}
        body: |
          🎉 **PDF Commander ${{ github.ref_name }}**

          ⚡ Uma ferramenta desktop profissional para manipulação avançada de PDFs!

          ## ✨ Funcionalidades
          - 🔄 União automática de múltiplos PDFs
          - 📏 Normalização para tamanhos padrão (100x145mm)
          - 📑 Layout em grade (4 PDFs por página A4)
          - 🏷️ Sistema completo de geração de etiquetas
          - 📊 Dashboard de monitoramento em tempo real
          - 🔄 Atualização automática via GitHub
          - 💾 Backup automático de arquivos

          ## 📥 Instalação
          1. Baixe o arquivo `PDF Commander Setup ${{ github.ref_name }}.exe`
          2. Execute o instalador
          3. Siga as instruções na tela

          ## 🤖 Desenvolvido com IA
          Este projeto foi criado utilizando tecnologias de IA para acelerar o desenvolvimento e otimizar a experiência do usuário.

          ---
          **⭐ Se este projeto foi útil para você, considere dar uma estrela!**
        draft: false
        prerelease: false

    - name: 📎 Anexar instalador ao Release
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist-release/PDF Commander Setup ${{ github.ref_name }}.exe
        asset_name: PDF Commander Setup ${{ github.ref_name }}.exe
        asset_content_type: application/octet-stream

    - name: 📎 Anexar blockmap (para atualizações)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist-release/PDF Commander Setup ${{ github.ref_name }}.exe.blockmap
        asset_name: PDF Commander Setup ${{ github.ref_name }}.exe.blockmap
        asset_content_type: application/octet-stream

    - name: 📎 Anexar latest.yml (para auto-updater)
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist-release/latest.yml
        asset_name: latest.yml
        asset_content_type: application/x-yaml