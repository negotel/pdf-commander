name: 🚀 Release PDF Commander

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger quando uma tag vX.X.X for criada

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Instalar dependências (Root)
      run: npm ci

    - name: 📦 Instalar dependências (Config-UI)
      run: |
        cd config-ui
        npm install
        cd ..

    - name: 🏗️ Build da interface React
      run: |
        cd config-ui
        npm run build
        cd ..

    - name: ⚡ Cache Electron Builder
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/electron
          ~/.cache/electron-builder
        key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-electron-

    - name: 📦 Build do executável
      run: npm run build:exe

    - name: 📋 Listar arquivos gerados
      run: |
        echo "=== Arquivos em dist-release ==="
        dir dist-release
        echo "=== Conteúdo do package.json ==="
        type package.json | findstr "version"

    - name: 🎯 Criar Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: PDF Commander ${{ github.ref_name }}
        body: |
          🎉 **PDF Commander ${{ github.ref_name }}**

          ⚡ Uma ferramenta desktop profissional para manipulação avançada de PDFs!

          ## ✨ Funcionalidades
          - 🔄 União automática de múltiplos PDFs
          - 📏 Normalização para tamanhos padrão (100x145mm)
          - 📑 Layout em grade (4 PDFs por página A4)
          - 🏷️ Sistema completo de geração de etiquetas
          - 📊 Dashboard de monitoramento em tempo real
          - 🔄 Atualização automática via GitHub
          - 💾 Backup automático de arquivos

          ## 📥 Instalação
          1. Baixe o arquivo `PDF Commander Setup ${{ github.ref_name }}.exe`
          2. Execute o instalador
          3. Siga as instruções na tela

          ## 🤖 Desenvolvido com IA
          Este projeto foi criado utilizando tecnologias de IA para acelerar o desenvolvimento e otimizar a experiência do usuário.

          ---
          **⭐ Se este projeto foi útil para você, considere dar uma estrela!**
        draft: false
        prerelease: false
        files: |
          ./dist-release/PDF Commander Setup*.exe
          ./dist-release/PDF Commander Setup*.exe.blockmap
          ./dist-release/latest.yml
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}